       • Four sections: Cook & Store, Chop & Portion,

    WHAT'S NEW:
    1. Meal Prep Guide (new screen):
       • "Prep guide" button appears on plan screen when a
         meal prep day is set in Profile settings.
       • AI generates a task-organized prep list based on

       • Produce: 1.20x (organic premium is consistent).
       • Dairy & Eggs: 1.15x (organic dairy significantly
         higher than conventional AI estimates).
       • Pantry & Grains: 1.05x (AI estimates accurate here).
       • Other: 1.10x (specialty snacks skew high).
       • Applied only when Amazon Fresh is the active store.

  ============================================================
  v4.11 — 2026-03-20
    WHAT'S NEW:
    1. Breakfast repeat rule removed:
       • Hardcoded "every breakfast must be different" rule
         removed from AI prompt. User instructions in the
         week context field now win — if you ask for 1-3
         repeated breakfasts to reduce grocery waste, the
         AI will follow that instruction.
    2. Member-specific week context handling strengthened:
       • AI prompt now explicitly instructs the model to
         parse member names from week context notes and
         apply nutrition/meal adjustments per person per day.
       • e.g. "Ryan long run Saturday" reliably triggers
         performance fueling for Ryan on Saturday.

  ============================================================
  v4.10 — 2026-03-20
    WHAT'S NEW:
    1. Recipe notes ("Notes for next time"):
       • Text box at the bottom of every recipe screen.
       • Auto-saves as you type — no button needed.
       • Persists in localStorage indefinitely alongside
         the existing thumbs up/down rating.
       • Clear button (x) removes the note for that recipe.
       • All saved notes fed into the AI prompt on next plan
         generation so the app learns household preferences.
       • "Recipe notes" section added to Settings showing all
         saved notes with individual and bulk clear options.

  ============================================================

       • "Foods to avoid" and "Dietary needs" removed from

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F7F4EF; --warm-white: #FDFCFA; --ink: #1C1A17; --ink-light: #6B6760; --ink-faint: #B0ADA8;
    --accent: #C85A2A; --accent-light: #F2E8E2; --accent-dark: #9e4420;
    --border: rgba(28,26,23,0.1); --border-med: rgba(28,26,23,0.18); --radius: 12px; --radius-sm: 8px;
    --green: #3A6B4A; --green-light: #E4EFE7;
    --likely: #EFF6EE; --likely-border: rgba(58,107,74,0.2); --likely-text: #3A6B4A;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; font-size: 15px; }
  .shell { max-width: 640px; margin: 0 auto; padding: 0 24px 80px; }
  header { padding: 40px 0 32px; display: flex; align-items: flex-start; justify-content: space-between; }
  .logo { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 300; letter-spacing: -0.5px; }
  .logo em { font-style: italic; color: var(--accent); }
  .tagline { font-size: 13px; color: var(--ink-faint); margin-top: 4px; }
  .settings-btn { background: none; border: none; cursor: pointer; padding: 4px; margin-top: 6px; color: var(--ink-faint); font-size: 22px; line-height: 1; transition: color .15s; }
  .settings-btn:hover { color: var(--accent); }
  .card { background: var(--warm-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 14px; }
  .sec-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.7px; color: var(--ink-light); margin-bottom: 12px; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-light); margin-bottom: 6px; }
  .field input, .field textarea, .field select { width: 100%; padding: 10px 14px; border: 1px solid var(--border-med); border-radius: var(--radius-sm); background: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; transition: border-color .15s; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .add-form { background: var(--cream); border: 1px dashed var(--border-med); border-radius: var(--radius-sm); padding: 16px; margin-top: 10px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; border: none; }
  .btn-primary { background: var(--ink); color: var(--warm-white); }
  .btn-primary:hover { background: #2d2b27; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: var(--accent-dark); }
  .btn-outline { background: transparent; border: 1px solid var(--border-med); color: var(--ink-light); }
  .btn-outline:hover { border-color: var(--ink-light); color: var(--ink); }
  .btn-sm { padding: 7px 14px; font-size: 13px; }
  .btn-ghost { background: none; border: none; color: var(--ink-light); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; padding: 0; }
  .btn-ghost:hover { color: var(--accent); }
  .btn-add { background: none; border: 1px dashed var(--border-med); color: var(--ink-light); border-radius: var(--radius-sm); padding: 8px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; width: 100%; margin-top: 8px; transition: all .15s; }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }
  .btn-full { width: 100%; justify-content: center; padding: 13px; font-size: 15px; }
  .btn-active { background: var(--ink) !important; color: var(--warm-white) !important; border-color: var(--ink) !important; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag { padding: 6px 16px; border-radius: 999px; font-size: 13px; cursor: pointer; border: 1px solid var(--border-med); background: var(--cream); color: var(--ink-light); transition: all .15s; user-select: none; }
  .tag.sel { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .api-banner { background: #FBF3DC; border: 1px solid rgba(184,134,11,0.25); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; color: var(--ink); line-height: 1.5; margin-bottom: 14px; }
  .api-banner a { color: #B8860B; }
  .loading { text-align: center; padding: 3rem 0; }
  .dots { display: inline-flex; gap: 6px; margin-bottom: 12px; }
  .dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: bop .9s infinite; }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bop { 0%,100%{transform:translateY(0);opacity:.4} 50%{transform:translateY(-6px);opacity:1} }
  .loading-text { font-size: 14px; color: var(--ink-light); }
  .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .day-block { margin-bottom: 18px; }
  .day-name { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.7px; color: var(--ink-light); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .event-pill { font-size: 11px; padding: 2px 9px; border-radius: 999px; background: var(--accent-light); color: var(--accent); border: 1px solid rgba(200,90,42,0.3); font-weight: 400; text-transform: none; letter-spacing: 0; }
  .meal-name { font-size: 13px; color: var(--ink); line-height: 1.4; font-weight: 500; }
  .meal-note { font-size: 11px; color: var(--ink-light); margin-top: 4px; line-height: 1.4; }
  .mab { background: none; border: none; font-size: 12px; color: var(--ink-faint); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; }
  .mab:hover { color: var(--accent); background: var(--accent-light); }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  .recipe-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 300; margin-bottom: 6px; }
  .recipe-meta { font-size: 13px; color: var(--ink-light); margin-bottom: 20px; }
  .r-sec { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-light); margin: 18px 0 10px; }
  .ing-list { list-style: none; }
  .ing-list li { font-size: 14px; color: var(--ink); padding: 6px 0; border-bottom: 1px solid var(--border); line-height: 1.5; }
  .ing-list li:last-child { border-bottom: none; }
  .step-list { list-style: none; }
  .step-list li { display: flex; gap: 12px; margin-bottom: 12px; font-size: 14px; line-height: 1.6; color: var(--ink); }
  .step-num { min-width: 24px; height: 24px; background: var(--accent-light); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
  .tip-box { background: var(--cream); border-left: 3px solid var(--accent); padding: 12px 16px; font-size: 13px; color: var(--ink-light); line-height: 1.6; margin-top: 4px; }
  .check-box { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; }
  .shop-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .shop-row:last-child { border-bottom: none; }
  .shop-item { font-size: 14px; color: var(--ink); }
  .err { background: #FCEBEB; border: 1px solid #F09595; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: #A32D2D; margin-bottom: 14px; }
  .fade-in { animation: fadeIn .3s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .inline-input { padding: 9px 12px; border: 1px solid var(--border-med); border-radius: var(--radius-sm); background: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; transition: border-color .15s; }
  .inline-input:focus { border-color: var(--accent); }
  /* v4.8 — Nutrition Profile cards */
  .np-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
  .np-card { padding: 10px 12px; border: 1.5px solid var(--border-med); border-radius: var(--radius-sm); cursor: pointer; transition: all .15s; background: var(--cream); }
  .np-card:hover { border-color: var(--accent); }
  .np-card.sel { border-color: var(--accent); background: var(--accent-light); }
  .np-card-name { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
  .np-card.sel .np-card-name { color: var(--accent); }
  .np-card-desc { font-size: 11px; color: var(--ink-light); line-height: 1.4; }
  .np-card.sel .np-card-desc { color: var(--accent-dark); }
  /* v4.8 — likely-have section */
  .likely-section { background: var(--likely); border: 1px solid var(--likely-border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 14px; }
  .likely-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.7px; color: var(--likely-text); margin-bottom: 4px; }
  .likely-sublabel { font-size: 12px; color: var(--likely-text); opacity: 0.7; margin-bottom: 12px; }
  .likely-row { display: flex; align-items: center; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--likely-border); cursor: pointer; }
  .likely-row:last-child { border-bottom: none; }
  /* v4.8 — member summary pill row */
  .member-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--warm-white); border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; font-size: 13px; }
  .member-pill-name { font-weight: 500; color: var(--ink); }
  .member-pill-np { font-size: 11px; color: var(--accent); }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div>
      <div class="logo">p<em>l</em>ate</div>
      <div class="tagline">meal planning for any household</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
      <button onclick="openFeedback()" style="background:none;border:1px solid var(--border-med);border-radius:999px;cursor:pointer;padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-light);transition:all .15s;">Feedback</button>
      <button class="settings-btn" onclick="goProfile()" title="Profile &amp; settings">⚙</button>
    </div>
  </header>
  <div id="app"></div>
</div>
<script>
// ── Safe Storage ──
var _mem = {};
function lsGet(k,d) { try { var v=localStorage.getItem(k); return v!==null?v:d; } catch(e){ return _mem[k]!==undefined?_mem[k]:d; } }
function lsSet(k,v) { try { localStorage.setItem(k,v); } catch(e){} _mem[k]=v; }

// ── Nutrition Profiles (v4.8 — renamed from Energy Archetypes) ──
var NP_PROFILES = [
  { id: 'Athlete',     name: 'Athlete',      desc: 'High carb + protein. Calorie-dense meals timed around training.' },
  { id: 'Active Work', name: 'Active Work',  desc: 'Sustained energy all day. Moderate-high protein, no afternoon crashes.' },
  { id: 'Standard',   name: 'Standard',     desc: 'Balanced macros, no special tuning. Well-rounded variety.' },
  { id: 'Stationary', name: 'Stationary',   desc: 'Lighter meals, fewer refined carbs, more fiber and vegetables.' },
  { id: 'Child/Teen', name: 'Child / Teen', desc: 'Age-appropriate portions. Growth-supportive protein, kid-friendly recipes.' },
  { id: 'Balanced',   name: 'Balanced',     desc: 'Flexible and variety-focused. No specific bias — built for options.' }
];

// ── State ──
var state = {
  view: 'setup',
  apiKey: lsGet('plate_key',''),
  members: JSON.parse(lsGet('plate_members','[]')),
  weekCtx: lsGet('plate_weekctx',''),
  foodNotes: lsGet('plate_foodnotes',''),
  mealTypes: new Set(JSON.parse(lsGet('plate_mealtypes','["breakfast","dinner"]'))),
  feedback: JSON.parse(lsGet('plate_feedback','{}')),
  recipeNotes: JSON.parse(lsGet('plate_recipenotes','{}')),
  recipeNotesKey: '',
  profile: JSON.parse(lsGet('plate_profile', JSON.stringify({
    dislikes: '', dietaryNeeds: '', cuisines: '',
    mealPrepDay: 'Sunday', isCook: 'yes', appliances: '', staples: [],
    location: 'Mountain View, CA', stores: [],
    servings: {breakfast: 2, lunch: 5, dinner: 5, snacks: 3},
    setupComplete: false
  }))),
  weekServings: JSON.parse(lsGet('plate_weekservings','null')),
  weekVolunteers: JSON.parse(lsGet('plate_weekvols','{}')),
  showAddForm: false,
  newMember: {name:'', age:'', activity:'', canCook:false, notes:''},
  activeStore: lsGet('plate_activestore',''),
  plan: JSON.parse(lsGet('plate_plan','null')),
  history: JSON.parse(lsGet('plate_history','[]')),
  dayIndex: 0,
  planView: 'day',
  recipe: null,
  editing: null,
  swapping: null,
  rejected: [],
  suggestion: null,
  fbTarget: null,
  moving: null,
  moveConflict: null,
  shopping: null,
  shoppingLikely: [],
  prepGuide: JSON.parse(lsGet('plate_prepguide','null')),
  checkedPrepItems: JSON.parse(lsGet('plate_prepitems','{}')),
  checkedItems: {},
  copied: false,
  servingsConsumed: {},
  bgFetch: lsGet('plate_bgfetch','true') !== 'false',
  prevView: 'setup',
  error: '',
  expandedMember: null
};

function save() {
  lsSet('plate_key', state.apiKey);
  lsSet('plate_plan', JSON.stringify(state.plan));
  lsSet('plate_history', JSON.stringify(state.history));
  lsSet('plate_members', JSON.stringify(state.members));
  lsSet('plate_weekctx', state.weekCtx);
  lsSet('plate_foodnotes', state.foodNotes);
  lsSet('plate_mealtypes', JSON.stringify([...state.mealTypes]));
  lsSet('plate_feedback', JSON.stringify(state.feedback));
  lsSet('plate_recipenotes', JSON.stringify(state.recipeNotes));
  lsSet('plate_prepguide', JSON.stringify(state.prepGuide));
  lsSet('plate_prepitems', JSON.stringify(state.checkedPrepItems));
  lsSet('plate_profile', JSON.stringify(state.profile));
  lsSet('plate_activestore', state.activeStore);
  lsSet('plate_bgfetch', state.bgFetch ? 'true' : 'false');
  lsSet('plate_weekservings', JSON.stringify(state.weekServings));
  lsSet('plate_weekvols', JSON.stringify(state.weekVolunteers));
}

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function div(cls, html) { var d=document.createElement('div'); if(cls)d.className=cls; d.innerHTML=html||''; return d; }
function getFB(name) { return (state.feedback[name]||{}).rating||0; }
function getServings(type) {
  if(state.weekServings&&state.weekServings[type]!=null) return state.weekServings[type];
  if(state.profile.servings&&state.profile.servings[type]!=null) return state.profile.servings[type];
  return type==='breakfast'?2:5;
}

var FEEDBACK_FORM_URL = 'https://forms.google.com/YOUR_FORM_ID_HERE';

// ── Render ──
function render() {
  var app = document.getElementById('app');
  app.innerHTML = '';
  if(state.error){ var e=div('err fade-in'); e.textContent=state.error; app.appendChild(e); }
  if(state.view==='setup') renderSetup(app);
  else if(state.view==='loading') renderLoading(app,'Building your meal plan...');
  else if(state.view==='plan'){ if(state.moveConflict) renderMoveConflict(app); else renderPlan(app); }
  else if(state.view==='recipe-loading') renderLoading(app,'Fetching recipe...');
  else if(state.view==='recipe') renderRecipe(app);
  else if(state.view==='shopping-loading') renderLoading(app,'Building your shopping list...');
  else if(state.view==='prep-loading') renderLoading(app,'Building your prep guide...');
  else if(state.view==='prep') renderPrepGuide(app);
  else if(state.view==='shopping') renderShopping(app);
  else if(state.view==='profile') renderProfile(app);
  else if(state.view==='history') renderHistory(app);
  else if(state.view==='nutrition') renderNutritionReport(app);
}

function renderLoading(app, msg) {
  app.appendChild(div('card fade-in','<div class="loading"><div class="dots"><span></span><span></span><span></span></div><div class="loading-text">'+msg+'</div></div>'));
}

// ── Nutrition Profile card grid ──
function buildNPCards(selectedId, onchangeFn) {
  var html = '<div class="np-grid">';
  NP_PROFILES.forEach(function(p) {
    var sel = selectedId === p.id;
    html += '<div class="np-card'+(sel?' sel':'')+'" onclick="'+onchangeFn+'(\''+p.id+'\')">'
      +'<div class="np-card-name">'+esc(p.name)+'</div>'
      +'<div class="np-card-desc">'+esc(p.desc)+'</div>'
      +'</div>';
  });
  html += '</div>';
  return html;
}

function completeFirstSetup() {
  if(state.members.length === 0) { state.error='Add at least one household member first.'; render(); return; }
  state.profile.setupComplete = true;
  // Sync dinner servings to all meal types as a default
  var ds = getServings('dinner');
  if(!state.profile.servings) state.profile.servings = {breakfast:2,lunch:5,dinner:5,snacks:3};
  state.profile.servings.dinner = ds;
  state.profile.servings.breakfast = Math.max(1, Math.round(ds * 0.6));
  state.profile.servings.lunch = ds;
  state.profile.servings.snacks = Math.max(1, Math.round(ds * 0.5));
  save();
  generatePlan();
}

// ── Plan ──
function renderPlan(app) {
  var days=(state.plan&&state.plan.days)||[];
  var mealOrder=['breakfast','lunch','dinner','snacks'].filter(function(m){return state.mealTypes.has(m);});
  if(state.dayIndex>=days.length) state.dayIndex=0;
  var vd=state.planView==='day';
  app.appendChild(div('fade-in',
    '<div class="week-header">'
    +'<div style="display:flex;gap:6px;">'
    +'<button class="btn btn-outline btn-sm" onclick="goSetup()">← Edit</button>'
    +'<button class="btn btn-outline btn-sm" onclick="state.prevView=\'plan\';state.view=\'history\';render()">History</button>'
    +'</div>'
    +'<div style="display:flex;gap:6px;">'
    +'<button class="btn btn-outline btn-sm '+(vd?'btn-active':'')+'" onclick="setPV(\'day\')">Day</button>'
    +'<button class="btn btn-outline btn-sm '+(!vd?'btn-active':'')+'" onclick="setPV(\'week\')">Week</button>'
    +'</div>'
    +'<button class="btn btn-outline btn-sm" onclick="generatePlan()">↻ New</button>'
    +'</div>'
  ));
  if(vd) renderDayView(app,days,mealOrder);
  else renderWeekView(app,days,mealOrder);
  app.appendChild(div('card fade-in',
    '<div style="display:flex;gap:8px;">'
    +'<button class="btn btn-accent btn-full" onclick="generateShopping()" style="flex:2;">Build shopping list →</button>'
    +(state.profile.mealPrepDay?'<button class="btn btn-outline btn-full" onclick="generatePrepGuide()" style="flex:1;">Meal Prep</button>':'')
    +'<button class="btn btn-outline btn-full" onclick="state.view=\'nutrition\';render()" style="flex:1;">Nutrition</button>'
    +'</div>'
  ));
}

function renderDayView(app,days,mealOrder) {
  var di=state.dayIndex;
  var day=days[di];
  var dots=days.map(function(_,i){ var bg=i===di?'var(--accent)':'var(--border-med)'; return '<div onclick="jumpDay('+i+')" style="width:8px;height:8px;border-radius:50%;cursor:pointer;background:'+bg+';transition:background .15s;"></div>'; }).join('');
  var prevDis=di===0?'disabled style="opacity:0.3;"':'';
  var nextDis=di===days.length-1?'disabled style="opacity:0.3;"':'';
  app.appendChild(div('',
    '<div style="display:grid;grid-template-columns:44px 1fr 44px;align-items:center;margin-bottom:14px;gap:8px;">'
    +'<button class="btn btn-outline btn-sm" onclick="prevDay()" '+prevDis+' style="width:44px;padding:7px 0;justify-content:center;">&larr;</button>'
    +'<div style="text-align:center;">'
    +'<div style="font-family:\'Fraunces\',serif;font-size:20px;font-weight:300;line-height:1.2;">'+esc(day.day)+'</div>'
    +(day.event?'<div style="margin-top:5px;"><span class="event-pill">'+esc(day.event)+'</span></div>':'')
    +'</div>'
    +'<button class="btn btn-outline btn-sm" onclick="nextDay()" '+nextDis+' style="width:44px;padding:7px 0;justify-content:center;">&rarr;</button>'
    +'</div>'
    +'<div style="display:flex;justify-content:center;gap:6px;margin-bottom:18px;">'+dots+'</div>'
  ));
  var card=div('card fade-in','');
  var html='';
  mealOrder.forEach(function(type,ti) {
    if(!day[type]) return;
    if(ti>0) html+='<div class="divider"></div>';
    html+='<div class="day-block"><div class="day-name"><span>'+type+'</span></div>'+buildMealCard(di,type,day[type],true)+'</div>';
  });
  card.innerHTML=html;
  app.appendChild(card);
  var dayNutri=calcDayNutrition(day,mealOrder);
  if(dayNutri.hasData) {
    var nc=div('card fade-in','');
    nc.innerHTML='<div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.6px;color:var(--ink-light);margin-bottom:10px;">Estimated daily total</div>'
      +'<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;text-align:center;">'
      +buildNutriBadge('Calories',dayNutri.calories,'')
      +buildNutriBadge('Protein',dayNutri.protein_g,'g')
      +buildNutriBadge('Carbs',dayNutri.carbs_g,'g')
      +buildNutriBadge('Fat',dayNutri.fat_g,'g')
      +buildNutriBadge('Sugar',dayNutri.sugar_g,'g')
      +'</div>';
    app.appendChild(nc);
  }
}

function renderWeekView(app,days,mealOrder) {
  var card=div('card fade-in','');
  var html='';
  days.forEach(function(day,di) {
    if(di>0) html+='<div class="divider"></div>';
    html+='<div class="day-block" style="cursor:pointer;" onclick="jumpDay('+di+');setPV(\'day\')">'
      +'<div class="day-name">'+esc(day.day)+(day.event?' <span class="event-pill">'+esc(day.event)+'</span>':'')+'<span style="margin-left:auto;font-size:11px;color:var(--accent);">edit →</span></div>'
      +'<div style="display:flex;flex-direction:column;gap:5px;">';
    mealOrder.forEach(function(type) {
      if(!day[type]) return;
      var fb=getFB(day[type].name);
      var indicator=fb===1?' <span style="font-size:11px;">👍</span>':fb===-1?' <span style="font-size:11px;">👎</span>':'';
      html+='<div style="display:flex;align-items:baseline;gap:8px;"><span style="font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);min-width:62px;flex-shrink:0;">'+type+'</span><span style="font-size:13px;color:var(--ink);">'+esc(day[type].name)+indicator+'</span></div>';
    });
    html+='</div></div>';
  });
  card.innerHTML=html;
  app.appendChild(card);
  app.appendChild(div('','<p style="font-size:12px;color:var(--ink-faint);text-align:center;margin-top:-4px;">Tap any day to edit</p>'));
}

function buildMealCard(di,type,meal,showRecipe) {
  var isEdit=state.editing&&state.editing.di===di&&state.editing.type===type;
  var isSwapping=state.swapping&&state.swapping.di===di&&state.swapping.type===type;
  var hasSug=state.suggestion&&state.suggestion.di===di&&state.suggestion.type===type;
  var hasFBNote=state.fbTarget&&state.fbTarget.di===di&&state.fbTarget.type===type;
  var isMoving=state.moving&&state.moving.di===di&&state.moving.type===type;
  if(isEdit) return '<div style="background:var(--cream);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:12px 14px;"><div style="font-size:12px;color:var(--ink-light);margin-bottom:6px;">Type a new meal name or describe a change</div><input type="text" id="edit-input" class="inline-input" value="'+esc(meal.name)+'" style="width:100%;margin-bottom:8px;"><div style="display:flex;gap:8px;"><button class="btn btn-accent btn-sm" onclick="saveEdit('+di+',\''+type+'\')">Apply</button><button class="btn btn-outline btn-sm" onclick="cancelEdit()">Cancel</button></div></div>';
  if(isSwapping) return '<div style="padding:14px;background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;"><div class="dots" style="justify-content:center;"><span></span><span></span><span></span></div><div style="font-size:13px;color:var(--ink-light);margin-top:6px;">Finding a swap...</div></div>';
  if(hasSug) {
    var s=state.suggestion.meal; var isReplacement=!!state.suggestion.isReplacement;
    return '<div style="background:var(--accent-light);border:1px solid rgba(200,90,42,0.3);border-radius:var(--radius-sm);overflow:hidden;"><div style="padding:12px 14px;"><div style="font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:5px;">'+type+' · '+(isReplacement?'suggested replacement':'suggested')+'</div><div class="meal-name" style="font-size:14px;">'+esc(s.name)+'</div>'+(s.note?'<div class="meal-note" style="margin-top:4px;">'+esc(s.note)+'</div>':'')+'</div><div style="display:flex;border-top:1px solid rgba(200,90,42,0.2);"><button class="mab" style="flex:1;padding:9px;border-right:1px solid rgba(200,90,42,0.2);color:var(--accent);font-weight:500;" onclick="acceptSwap()">✓ Use this</button><button class="mab" style="flex:1;padding:9px;border-right:1px solid rgba(200,90,42,0.2);" onclick="rejectSwap()">↻ Try again</button>'+(isReplacement?'<button class="mab" style="flex:1;padding:9px;" onclick="clearReplacementSlot('+di+',\''+type+'\')">✕ Leave empty</button>':'<button class="mab" style="flex:1;padding:9px;" onclick="cancelSwap()">✕ Keep</button>')+'</div></div>';
  }
  if(isMoving) {
    var days=(state.plan&&state.plan.days)||[];
    var dayBtns=days.map(function(d,i){ if(i===di)return''; return'<button class="mab" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);margin:3px;" onclick="moveTo('+i+')">'+esc(d.day.slice(0,3))+'</button>'; }).join('');
    return'<div style="padding:10px 14px;background:var(--warm-white);border:1px solid var(--border);border-radius:var(--radius-sm);"><div style="font-size:12px;color:var(--ink-light);margin-bottom:8px;">Move to which day?</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">'+dayBtns+'</div><button class="btn btn-outline btn-sm" onclick="state.moving=null;render()">Cancel</button></div>';
  }
  var liked=getFB(meal.name)===1; var disliked=getFB(meal.name)===-1;
  var likedStyle=liked?'color:var(--green);font-weight:500;background:var(--green-light);':'';
  var dislikedStyle=disliked?'color:#A32D2D;font-weight:500;background:#FCEBEB;':'';
  var out='<div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;">';
  if(showRecipe) out+='<div style="padding:14px 16px;cursor:pointer;" onclick="loadRecipe('+di+',\''+type+'\')"><div class="meal-name" style="font-size:15px;">'+esc(meal.name)+'</div>'+(meal.note?'<div class="meal-note" style="margin-top:5px;">'+esc(meal.note)+'</div>':'')+'<div style="margin-top:8px;font-size:12px;color:var(--accent);">Tap for recipe →</div></div>';
  else out+='<div style="padding:10px 12px;"><div style="font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:3px;">'+type+'</div><div class="meal-name">'+esc(meal.name)+'</div></div>';
  if(hasFBNote) {

function parseBaseServings(servingsStr) {
  if (!servingsStr) return 1;
  // Handle plain numbers: "4", "4.0"
  var plain = parseFloat(servingsStr);
  if (!isNaN(plain) && plain > 0) return plain;
  // Handle strings like "Serves 4", "Makes 6", "4 servings", "serves 4-6"
  var match = String(servingsStr).match(/(\d+(?:\.\d+)?)/);
  if (match) { var n = parseFloat(match[1]); if (!isNaN(n) && n > 0) return n; }
  return 1;
}

function scaleIngredient(ingredient, ratio) {
  if (Math.abs(ratio - 1) < 0.01) return ingredient;
  return ingredient.replace(/^(\d+\/\d+|\d+\.?\d*)/,function(match){
    var num;
    if (match.indexOf('/') !== -1) {
      var parts = match.split('/');
      num = parseFloat(parts[0]) / parseFloat(parts[1]);
    } else {
      num = parseFloat(match);
    }
    if (isNaN(num) || num === 0) return match;
    var scaled = num * ratio;
    if (scaled === Math.round(scaled)) return String(Math.round(scaled));
    return toNiceFraction(scaled);
  });
}
function toNiceFraction(n){var r=Math.round(n*4)/4;var w=Math.floor(r);var f=r-w;var fs='';if(Math.abs(f-0.25)<0.01)fs='¼';else if(Math.abs(f-0.5)<0.01)fs='½';else if(Math.abs(f-0.75)<0.01)fs='¾';if(w===0)return fs||n.toFixed(1);return fs?w+fs:String(w);}

function friendlyError(msg){if(!msg)return'Something went wrong. Please try again.';if(msg.indexOf('exceeded_limit')!==-1||msg.indexOf('rate')!==-1)return'API rate limit reached. Check console.anthropic.com.';if(msg.indexOf('invalid_api_key')!==-1||msg.indexOf('authentication')!==-1)return'Invalid API key. Please check your key in settings.';if(msg.indexOf('overloaded')!==-1)return'Claude is overloaded. Wait a moment and try again.';if(msg.charAt(0)==='{')return'API error. Please try again.';return msg.length>120?msg.slice(0,120)+'…':msg;}

function callAPI(prompt,maxTokens,onSuccess,onError){
  // Use Netlify proxy if available (production), fall back to direct call (local dev with API key)
  var useProxy = window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';
  var url = useProxy ? '/.netlify/functions/proxy' : 'https://api.anthropic.com/v1/messages';
  var headers = {'Content-Type':'application/json'};
  if(!useProxy){ headers['x-api-key']=state.apiKey; headers['anthropic-version']='2023-06-01'; headers['anthropic-dangerous-allow-browser']='true'; }
  fetch(url,{
    method:'POST',
    headers:headers,
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.error)throw new Error(JSON.stringify(data.error));
    var text=(data.content&&data.content[0]&&data.content[0].text)||'';
    var si=text.indexOf('{'),ei=text.lastIndexOf('}');
    onSuccess(JSON.parse(text.slice(si,ei+1)));
  }).catch(function(e){onError(friendlyError(e.message||String(e)));});
}

        var name=day[type].name;

          day: day.day,

        });

    });
  });

function generateShopping(){

  callAPI(prompt,2500,function(shopping){var likelyItems=shopping['YouLikelyHave']||[];delete shopping['YouLikelyHave'];var cleaned={};Object.keys(shopping).forEach(function(k){if(shopping[k]&&shopping[k].length)cleaned[k]=shopping[k];});var activeStaples=(state.profile.staples||[]).filter(function(s){return s.active;}).map(function(s){return s.name;});activeStaples.forEach(function(s){if(likelyItems.indexOf(s)===-1)likelyItems.push(s);});state.shopping=cleaned;state.shoppingLikely=likelyItems;state.checkedItems={};state.shoppingCosts={};state.view='shopping';render();parseInlineCosts(cleaned);},function(e){state.view='plan';state.error='Could not build shopping list: '+e;render();});}

function parseInlineCosts(shopping){
  var rawCosts={};
  var itemCategories={};
  Object.keys(shopping).forEach(function(cat){
    (shopping[cat]||[]).forEach(function(item){
      var match=item.match(/\$(\d+(?:\.\d{1,2})?)/);
      if(match){rawCosts[item]=parseFloat(match[1]);itemCategories[item]=cat;}
    });
  });
  state.shoppingBaseCosts=rawCosts;
  state.shoppingItemCategories=itemCategories;
  var costs={};
  Object.keys(rawCosts).forEach(function(k){
    var cat=itemCategories[k]||'';
    var multiplier=getCostMultiplier(cat);
    costs[k]=Math.round(rawCosts[k]*multiplier*100)/100;
  });
  state.shoppingCosts=costs;
  // For display: compute blended multiplier for the total line
  state.costMultiplier=getCostMultiplier('');
  if(state.view==='shopping')render();
}
function reapplyCostMultiplier(){
  if(!state.shoppingBaseCosts||!Object.keys(state.shoppingBaseCosts).length)return;
  var itemCategories=state.shoppingItemCategories||{};

  Object.keys(state.shoppingBaseCosts).forEach(function(k){
    var cat=itemCategories[k]||'';
    var multiplier=getCostMultiplier(cat);
    costs[k]=Math.round(state.shoppingBaseCosts[k]*multiplier*100)/100;
  });
  state.shoppingCosts=costs;
  state.costMultiplier=getCostMultiplier('');
  if(state.view==='shopping')render();
}
function getAmazonFreshCategoryMultiplier(category){
  // Per-category multipliers calibrated from real Mountain View Amazon Fresh invoice (March 2026)
  // Proteins: beef $18.99/lb, chicken $3.97/lb family pack — weighted avg ~25-30% above AI estimates
  // Produce: organic premium consistent ~20% above AI estimates
  // Dairy: organic milk $6.19/half gal vs ~$4-5 AI estimate — ~15% above
  // Pantry: pasta, beans, vinegar all within 5% of AI estimates
  var map={
    'Produce':1.20,
    'Proteins':1.30,
    'Dairy & Eggs':1.15,
    'Pantry & Grains':1.05,
    'Frozen':1.10,
    'Other':1.10
  };
  return map[category]||1.10;
}
function getCostMultiplier(category){
  var location=(state.profile.location||'').toLowerCase();
  var store=(state.activeStore||(state.profile.stores&&state.profile.stores[0])||'').toLowerCase();
  // Amazon Fresh: use per-category multipliers from real invoice data
  if(store.indexOf('amazon fresh')!==-1||store.indexOf('amazon')!==-1){
    var catMultiplier=category?getAmazonFreshCategoryMultiplier(category):1.15;
    // Still apply location factor for non-Mountain View users
    var locFactor=1.0;
    var highCostAreas=['new york','nyc','san francisco','sf','los angeles','la','boston','seattle','chicago','washington dc','dc','miami','austin','denver','portland','san jose','oakland','brooklyn','mountain view','palo alto','menlo park','cupertino','sunnyvale','santa clara'];
    highCostAreas.forEach(function(area){if(location.indexOf(area)!==-1)locFactor=1.0;}); // Mountain View already baked in
    return catMultiplier*locFactor;
  }
  // Other stores: original flat multiplier logic
  var highCostAreas=['new york','nyc','san francisco','sf','los angeles','la','boston','seattle','chicago','washington dc','dc','miami','austin','denver','portland','san jose','oakland','brooklyn','mountain view','palo alto','menlo park','cupertino','sunnyvale','santa clara'];
  var locationMultiplier=1.0;
  highCostAreas.forEach(function(area){if(location.indexOf(area)!==-1)locationMultiplier=1.10;});
  var premiumStores=['whole foods','erewhon','sprouts','bristol farms','central market','fresh market','dean & deluca','market hall'];
  var storeMultiplier=1.0;
  premiumStores.forEach(function(s){if(store.indexOf(s)!==-1)storeMultiplier=1.20;});
  return locationMultiplier*storeMultiplier;
}

render();
</script>
